<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Монитор статусов</title>
    <style>
        /* Базовые стили для корректного отображения */
        .user-item { display: flex; align-items: center; margin-bottom: 10px; font-family: sans-serif; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="myInfo">Загрузка профиля...</div>
    <hr>
    <div id="groupList"></div>

    <div style="margin-top: 20px;">
        <button onclick="changeStatus('Работаю', 'green')">Работаю</button>
        <button onclick="changeStatus('Обедаю', 'orange')">Обедаю</button>
        <button onclick="changeStatus('Отдыхаю', 'red')">Отдыхаю</button>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // 1. Настройки подключения (замените на свои)
        const URL = 'https://jwmkwybnmcdrtcinwkbj.supabase.co';
        const KEY = 'sb_publishable_br_nn2jCaXKmd5ou1IsZEA_WTe3g3Tv';
        const supabase = createClient(URL, KEY);

        // 2. Вставьте ваш ID из таблицы profiles
        const MY_ID = '432c9bcb-c709-4c1b-92a7-6425e86d27f3';

        // Функция смены статуса
        window.changeStatus = async (text, color) => {
            const { error } = await supabase
                .from('profiles')
                .update({ status: text, color: color }) // Убедитесь, что колонка 'color' создана в БД
                .eq('id', MY_ID);

            if (error) {
                alert("Ошибка! Проверьте RLS политики в Supabase.");
                console.error(error);
            } else {
                fetchGroup(); // Обновляем список сразу после изменения
            }
        };

        // Функция получения списка всех пользователей
        async function fetchGroup() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*')
                .order('username', { ascending: true });

            if (error) return console.error(error);

            const list = document.getElementById('groupList');
            list.innerHTML = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#ccc'}"></div>
                    <div style="flex-grow: 1;">
                        <strong>${user.username}</strong><br>
                        <small style="color: #666;">${user.status || 'Статус не задан'}</small>
                    </div>
                </div>
            `).join('');

            // Отображение информации о текущем пользователе
            const me = data.find(u => u.id === MY_ID);
            if (me) {
                document.getElementById('myInfo').innerText = `Вы зашли как: ${me.username}`;
            }
        }

        // Первичный вызов
        fetchGroup();

        // Обновление данных каждые 5 секунд (Polling)
        setInterval(fetchGroup, 5000);

    </script>
</body>
</html>
